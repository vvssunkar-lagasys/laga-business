<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaGa GST Systems | Premium Billing</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./lib/supabase.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./fonts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="mesh-gradient">
    <div id="app">
        <!-- Auth Root -->
        <div id="auth-root" class="min-h-screen flex items-center justify-center p-4">
            <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl space-y-6">
                <div class="text-center">
                    <h1 class="text-3xl font-bold text-slate-900">LaGa Systems</h1>
                    <p class="text-slate-500 mt-2">Professional GST Billing & Accounting</p>
                </div>

                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Email</label>
                        <input type="email" id="email" required autocomplete="email"
                            class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Password</label>
                        <input type="password" id="password" required autocomplete="current-password"
                            class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                    <button type="submit" id="login-btn"
                        class="w-full bg-slate-900 text-white py-2.5 rounded-lg font-semibold hover:bg-slate-800 transition-all shadow-lg active:scale-[0.98]">
                        Sign In
                    </button>
                </form>

                <div class="pt-6 border-t border-slate-100">
                    <div id="status-board" class="space-y-2">
                        <div class="grid grid-cols-2 gap-1">
                            <div id="status-css" class="dot ready" title="Styles Ready"></div>
                            <div id="status-js" class="dot" title="Logic Active"></div>
                        </div>
                        <p id="status-text"
                            class="text-[9px] text-slate-400 uppercase font-bold tracking-widest text-center">
                            Initializing System</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Workspace (Hidden) -->
        <div id="main-root" class="hidden flex h-screen">
            <!-- Sidebar -->
            <aside
                class="w-72 bg-[#0f172a] text-slate-400 flex flex-col border-r border-[#1e293b] relative z-20 transition-all duration-300 ease-in-out">
                <!-- Logo Area -->
                <div class="h-20 flex items-center px-6 border-b border-[#1e293b] logo-area">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20 shrink-0">
                            <span class="text-white font-bold text-lg">L</span>
                        </div>
                        <div class="logo-text sidebar-logo-text">
                            <h2 class="text-white font-bold leading-none tracking-tight">LaGa Systems</h2>
                        </div>
                    </div>
                </div>

                <!-- Sidebar Search -->
                <div class="sidebar-search">
                    <svg class="w-4 h-4 search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" id="sidebar-search-input" placeholder="Quick Find..." oninput="ui.sidebar.search(this.value)">
                    <button onclick="ui.sidebar.clearSearch()" class="sidebar-search-reset" title="Clear Search">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <!-- Navigation -->
                <nav class="flex-1 flex flex-col px-4 py-6 space-y-1 overflow-y-auto custom-scrollbar">

                    <!-- Main Menu -->
                    <div class="px-2 mb-2 text-[10px] font-bold uppercase tracking-wider text-slate-500">Main Menu</div>

                    <a href="#dashboard" class="nav-link active group" data-tooltip="Dashboard">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                            </svg>
                        </span>
                        <span>Dashboard</span>
                    </a>


                    <a href="#customers" class="nav-link group" data-tooltip="Customers">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                        </span>
                        <span>Customers</span>
                    </a>

                    <!-- Sales Section -->
                    <a href="#invoices" class="nav-link group" data-tooltip="Tax Invoices">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </span>
                        <span>Tax Invoices</span>
                    </a>


                    <!-- Procurement Module (Hidden for now)
                    <div class="mt-1">
                        <div class="nav-dropdown-trigger group" onclick="ui.sidebar.toggle('purchases')">
                            ...
                        </div>
                        <div id="dropdown-purchases" class="nav-dropdown-content active">
                            ...
                        </div>
                    </div>
                    -->

                    <!-- Quotations Section -->
                    <a href="#quotations" class="nav-link group" data-tooltip="Quotations">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                        </span>
                        <span>Quotations</span>
                    </a>

                    <a href="#proforma" class="nav-link group" data-tooltip="Pro Forma">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                            </svg>
                        </span>
                        <span>Pro Forma</span>
                    </a>

                    <a href="#challans" class="nav-link group" data-tooltip="Delivery Challans">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 011 1v2a1 1 0 01-1 1m-4-4h4m-8 0H3a1 1 0 01-1-1v-4a1 1 0 011-1h2m14 2h1a1 1 0 011 1v4a1 1 0 01-1 1h-1m-4-5l-2-2h-4v7h4l2 2h4V11a1 1 0 00-1-1z" />
                            </svg>
                        </span>
                        <span>Delivery Challans</span>
                    </a>


                    <div class="my-4 border-t border-[#1e293b]"></div>

                    <!-- Accounting & System -->
                    <div class="px-2 mb-2 text-[10px] font-bold uppercase tracking-wider text-slate-500">Finance &
                        Controls</div>

                    <a href="#reports" class="nav-link group" data-tooltip="GST Reports">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                        </span>
                        <span>GST Reports</span>
                    </a>

                    <a href="#licenses" class="nav-link group" data-tooltip="Licenses">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                            </svg>
                        </span>
                        <span>Licenses</span>
                    </a>

                    <a href="#settings" class="nav-link group" data-tooltip="Settings">
                        <span class="nav-icon">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </span>
                        <span>Settings</span>
                    </a>
                </nav>

                <!-- User Profile -->
                <div class="p-4 border-t border-[#1e293b] bg-[#0b1120] sidebar-profile">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-300">
                            U
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <p id="user-display" class="text-sm font-medium text-slate-200 truncate">user@laga.com</p>
                            <p class="text-[10px] text-slate-500">Administrator</p>
                        </div>
                        <button id="logout-btn"
                            class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors"
                            title="Sign Out">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Content Area -->
            <main class="flex-1 flex flex-col overflow-hidden bg-white/30 backdrop-blur-sm">
                <header class="h-16 px-6 border-b border-slate-200/50 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="sidebar-toggle" onclick="ui.sidebar.collapse()"
                            class="p-2 -ml-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100/80 rounded-xl transition-all active:scale-95 group"
                            title="Toggle Sidebar">
                            <svg class="w-5 h-5 transition-transform duration-300 group-hover:scale-110" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                        <h3 id="view-title" class="text-lg font-semibold text-slate-900">Dashboard</h3>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="text-xs font-bold text-slate-400 uppercase">FY:</span>
                        <select id="fy-select" class="bg-white border text-sm rounded-lg px-2 py-1 outline-none">
                            <option>2023-24</option>
                            <option>2024-25</option>
                            <option>2025-26</option>
                            <option>2026-27</option>
                        </select>
                    </div>
                </header>
                <div id="view-container" class="flex-1 overflow-y-auto p-6 scroll-smooth">
                    <!-- Dynamic View -->
                </div>
                <div id="quick-action-root" class="fixed bottom-8 right-8 z-50">
                    <button id="fab-main" onclick="ui.sidebar.toggleQuickActions()"
                        class="w-14 h-14 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center transition-all duration-300 hover:rotate-90">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </button>
                    <div id="fab-menu"
                        class="absolute bottom-full right-0 mb-4 flex flex-col items-end gap-3 pointer-events-none opacity-0 translate-y-4 transition-all duration-300">
                        <button onclick="ui.invoice.create(); ui.sidebar.toggleQuickActions()"
                            class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl shadow-xl hover:bg-blue-50 transition-all border border-blue-100 whitespace-nowrap group/item">
                            <span class="text-sm font-semibold text-slate-700">New Tax Invoice</span>
                            <div class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                        </button>
                        <button onclick="ui.quotation_v2.create(); ui.sidebar.toggleQuickActions()"
                            class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl shadow-xl hover:bg-blue-50 transition-all border border-blue-100 whitespace-nowrap">
                            <span class="text-sm font-semibold text-slate-700">New Quotation</span>
                            <div class="w-8 h-8 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                            </div>
                        </button>
                        <button onclick="ui.proforma_v2.create(); ui.sidebar.toggleQuickActions()"
                            class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl shadow-xl hover:bg-blue-50 transition-all border border-blue-100 whitespace-nowrap">
                            <span class="text-sm font-semibold text-slate-700">New Pro Forma</span>
                            <div class="w-8 h-8 rounded-lg bg-sky-100 text-sky-600 flex items-center justify-center">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                            </div>
                        </button>
                        <button onclick="ui.modal.open('customer'); ui.sidebar.toggleQuickActions()"
                            class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl shadow-xl hover:bg-blue-50 transition-all border border-blue-100 whitespace-nowrap">
                            <span class="text-sm font-semibold text-slate-700">New Customer</span>
                            <div class="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                                </svg>
                            </div>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-root" class="w-full flex justify-center"></div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>

</html>
