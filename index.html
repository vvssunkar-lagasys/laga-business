<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaGa GST Systems | Premium Billing</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./lib/supabase.js" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./fonts.js" charset="utf-8"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="mesh-gradient">
    <div id="app">
        <!-- Auth Root -->
        <div id="auth-root" class="min-h-screen flex items-center justify-center p-4">
            <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl space-y-6">
                <div class="text-center">
                    <h1 class="text-3xl font-bold text-slate-900">LaGa Systems</h1>
                    <p class="text-slate-500 mt-2">Professional GST Billing & Accounting</p>
                </div>

                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Email</label>
                        <input type="email" id="email" required autocomplete="email"
                            class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Password</label>
                        <input type="password" id="password" required autocomplete="current-password"
                            class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                    <button type="submit" id="login-btn"
                        class="w-full bg-slate-900 text-white py-2.5 rounded-lg font-semibold hover:bg-slate-800 transition-all shadow-lg active:scale-[0.98]">
                        Sign In
                    </button>
                </form>

                <div class="pt-6 border-t border-slate-100">
                    <div id="status-board" class="space-y-2">
                        <div class="grid grid-cols-2 gap-1">
                            <div id="status-css" class="dot ready" title="Styles Ready"></div>
                            <div id="status-js" class="dot" title="Logic Active"></div>
                        </div>
                        <p id="status-text"
                            class="text-[9px] text-slate-400 uppercase font-bold tracking-widest text-center">
                            Initializing System</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Workspace (Hidden) -->
        <div id="main-root" class="hidden flex flex-col h-screen">
            <!-- Top Navigation Bar -->
            <header class="w-full bg-[#0f172a] text-slate-400 flex items-center px-6 h-16 border-b border-[#1e293b] z-20 shrink-0 justify-between select-none shadow-md">
                <!-- Left: Logo & Links -->
                <div class="flex items-center gap-8 h-full">
                    <!-- Logo -->
                    <div class="flex items-center gap-3">
                        <div id="top-nav-logo-container" class="w-8 h-8 rounded-lg bg-white flex items-center justify-center shadow-lg shadow-black/5 shrink-0 overflow-hidden">
                            <span id="top-nav-logo-placeholder" class="text-blue-600 font-bold text-sm">L</span>
                            <img id="top-nav-logo" src="" class="hidden w-full h-full object-contain" alt="Logo">
                        </div>
                        <h2 id="top-nav-company-name" class="text-white font-bold leading-none tracking-tight hidden md:block">LaGa Systems</h2>
                    </div>

                    <!-- Navigation Links -->
                    <nav class="hidden md:flex items-center h-full gap-2 text-[13px] font-semibold text-slate-400">
                        <a href="#dashboard" class="top-nav-link active">Dashboard</a>
                        <a href="#customers" class="top-nav-link">Customers</a>
                        
                        <!-- Sales Dropdown -->
                        <div class="relative h-full top-dropdown-group">
                            <button class="top-nav-link flex items-center gap-1.5 h-full">
                                Sales
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                            </button>
                            <div class="absolute top-[calc(100%-8px)] left-0 min-w-[200px] bg-[#1e293b] border border-[#334155] rounded-xl shadow-2xl py-2 opacity-0 pointer-events-none translate-y-2 transition-all duration-200 z-50 top-dropdown-menu">
                                <a href="#invoices" class="block px-4 py-2 hover:bg-[#334155] hover:text-white transition-colors">Tax Invoices</a>
                                <a href="#quotations" class="block px-4 py-2 hover:bg-[#334155] hover:text-white transition-colors">Quotations</a>
                                <a href="#proforma" class="block px-4 py-2 hover:bg-[#334155] hover:text-white transition-colors">Pro Forma</a>
                                <a href="#challans" class="block px-4 py-2 hover:bg-[#334155] hover:text-white transition-colors">Delivery Challans</a>
                            </div>
                        </div>

                        <!-- Finance & Settings Dropdown -->
                        <div class="relative h-full top-dropdown-group">
                            <button class="top-nav-link flex items-center gap-1.5 h-full">
                                Systems
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                            </button>
                            <div class="absolute top-[calc(100%-8px)] left-0 min-w-[180px] bg-[#1e293b] border border-[#334155] rounded-xl shadow-2xl py-2 opacity-0 pointer-events-none translate-y-2 transition-all duration-200 z-50 top-dropdown-menu">
                                <a href="#reports" class="block px-4 py-2 hover:bg-[#334155] hover:text-white transition-colors">GST Reports</a>
                                <a href="#licenses" class="block px-4 py-2 hover:bg-[#334155] hover:text-white transition-colors">Licenses</a>
                                <div class="my-1 border-t border-[#334155]"></div>
                                <a href="#settings" class="block px-4 py-2 hover:bg-[#334155] hover:text-white transition-colors">Settings</a>
                            </div>
                        </div>
                    </nav>
                </div>

                <!-- Right: Search & Profile -->
                <div class="flex items-center gap-6 h-full">
                    <!-- Global Spotlight Search -->
                    <div class="relative hidden lg:block w-72" id="global-search-wrapper">
                        <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 transition-colors peer-focus:text-blue-400 z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input type="text" id="global-search-input" autocomplete="off" placeholder="Search invoices, customers..." oninput="ui.globalSearch.search(this.value)" onfocus="ui.globalSearch.onFocus()" class="peer w-full bg-[#1e293b] border border-[#334155] rounded-full pl-9 pr-8 py-1.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                        <button onclick="ui.globalSearch.clear()" id="global-search-clear" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors hidden">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                        <!-- Results Dropdown -->
                        <div id="global-search-results" class="global-search-results hidden"></div>
                    </div>

                    <!-- Profile -->
                    <div class="flex items-center gap-3">
                        <div class="text-right hidden sm:block">
                            <p id="user-display" class="text-xs font-semibold text-slate-100 leading-tight">user@laga.com</p>
                            <p class="text-[10px] text-slate-500">Admin</p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-300 ring-2 ring-slate-800 cursor-pointer">
                            U
                        </div>
                        <button id="logout-btn" class="ml-1 text-slate-500 hover:text-red-400 transition-colors" title="Sign Out">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Main Page Content -->
            <main class="flex-1 flex flex-col overflow-hidden bg-slate-50 relative">
                <!-- Page Header (Title + FY) -->
                <header class="h-14 px-6 border-b border-slate-200/50 flex items-center justify-between bg-white shrink-0 shadow-sm z-10">
                    <div class="flex items-center gap-4">
                        <h3 id="view-title" class="text-lg font-bold text-slate-800 tracking-tight">Dashboard</h3>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">FY:</span>
                        <select id="fy-select" class="bg-slate-50 border border-slate-200 text-xs font-bold rounded-lg px-2 py-1.5 outline-none focus:ring-2 focus:ring-blue-500/20 text-slate-700 cursor-pointer transition-all">
                            <option>2023-24</option>
                            <option>2024-25</option>
                            <option>2025-26</option>
                            <option>2026-27</option>
                        </select>
                    </div>
                </header>

                <div id="view-container" class="flex-1 overflow-y-auto p-6 scroll-smooth bg-slate-50/50">
                    <!-- Dynamic View -->
                </div>

                <!-- Floating Quick Action Menu -->
                <div id="quick-action-root" class="fixed bottom-8 right-8 z-50">
                    <button id="fab-main" onclick="ui.sidebar.toggleQuickActions()" class="w-14 h-14 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-full shadow-2xl shadow-blue-500/40 flex items-center justify-center transition-all duration-300 hover:rotate-90 hover:scale-110">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    </button>
                    <div id="fab-menu" class="absolute bottom-full right-0 mb-4 flex flex-col items-end gap-3 pointer-events-none opacity-0 translate-y-4 transition-all duration-300">
                        <button onclick="ui.invoice.create(); ui.sidebar.toggleQuickActions()" class="flex items-center gap-3 bg-white px-4 py-2.5 rounded-2xl shadow-xl hover:bg-slate-50 transition-all border border-slate-100 whitespace-nowrap group/item cursor-pointer">
                            <span class="text-sm font-bold text-slate-700">New Tax Invoice</span>
                            <div class="w-8 h-8 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center group-hover/item:scale-110 transition-transform">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </div>
                        </button>
                        <button onclick="ui.quotation_v2.create(); ui.sidebar.toggleQuickActions()" class="flex items-center gap-3 bg-white px-4 py-2.5 rounded-2xl shadow-xl hover:bg-slate-50 transition-all border border-slate-100 whitespace-nowrap group/item cursor-pointer">
                            <span class="text-sm font-bold text-slate-700">New Quotation</span>
                            <div class="w-8 h-8 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center group-hover/item:scale-110 transition-transform">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                            </div>
                        </button>
                        <button onclick="ui.proforma_v2.create(); ui.sidebar.toggleQuickActions()" class="flex items-center gap-3 bg-white px-4 py-2.5 rounded-2xl shadow-xl hover:bg-slate-50 transition-all border border-slate-100 whitespace-nowrap group/item cursor-pointer">
                            <span class="text-sm font-bold text-slate-700">New Pro Forma</span>
                            <div class="w-8 h-8 rounded-xl bg-sky-50 text-sky-600 flex items-center justify-center group-hover/item:scale-110 transition-transform">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                            </div>
                        </button>
                        <button onclick="ui.modal.open('customer'); ui.sidebar.toggleQuickActions()" class="flex items-center gap-3 bg-white px-4 py-2.5 rounded-2xl shadow-xl hover:bg-slate-50 transition-all border border-slate-100 whitespace-nowrap group/item cursor-pointer">
                            <span class="text-sm font-bold text-slate-700">New Customer</span>
                            <div class="w-8 h-8 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center group-hover/item:scale-110 transition-transform">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>
                            </div>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-root" class="w-full flex justify-center"></div>
    </div>

    <!-- Preview Sidebar -->
    <div id="preview-sidebar-overlay" class="preview-sidebar-overlay" onclick="ui.preview.close()">
        <div id="preview-sidebar-root" class="preview-sidebar-root" onclick="event.stopPropagation()">
            <!-- Dynamic Preview Content -->
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js" charset="utf-8"></script>
</body>

</html>
